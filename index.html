<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aula1</title>
</head>
<body>
    <script>
        
        // 1. Leia um nome via prompt() e exiba no alert e console
        let nome = prompt("1. Leia um nome via prompt() e exiba no alert e console - Digite seu nome:");
        alert("Olá, " + nome);
        console.log("Nome digitado:", nome);


        // 2. Leia dois números e mostre as quatro operações
        let n1 = Number(prompt("2. Leia dois números e mostre as quatro operações - Digite o primeiro número:"));
        let n2 = Number(prompt("Digite o segundo número:"));

        alert(
            "Soma: " + (n1+n2) +
            "\nSubtração: " + (n1-n2) +
            "\nMultiplicação: " + (n1*n2) +
            "\nDivisão: " + (n1/n2)
        );


        // 3. Verifique se um número é par ou ímpar
        let num = Number(prompt("3. Verifique se um número é par ou ímpar - Digite um número:"));

        if(num % 2 === 0){
            alert("Número par");
        }else{
            alert("Número ímpar");
        }


        // 4. Leia três números e mostre maior e menor
        let a = Number(prompt("4. Leia três números e mostre maior e menor - Número 1:"));
        let b = Number(prompt("Número 2:"));
        let c = Number(prompt("Número 3:"));

        let maior = Math.max(a,b,c);
        let menor = Math.min(a,b,c);

        alert("Maior: " + maior + "\nMenor: " + menor);


        // 5. Média de três notas
        let nota1 = Number(prompt("5. Média de três notas - Nota 1:"));
        let nota2 = Number(prompt("Nota 2:"));
        let nota3 = Number(prompt("Nota 3:"));

        let media = (nota1 + nota2 + nota3)/3;

        if(media >= 6){
            alert("Média: " + media + "\nAprovado");
        }else{
            alert("Média: " + media + "\nReprovado");
        }


        // 6. Tabuada de um número
        let t = Number(prompt("6. Tabuada de um número - Digite um número para tabuada:"));
        let resultado = "";

        for(let i=1;i<=10;i++){
            resultado += t + " x " + i + " = " + (t*i) + "\n";
        }

        alert(resultado);


        // 7. Fatorial
        let f = Number(prompt("7. Fatorial - Digite um número para fatorial:"));
        let fat = 1;

        for(let i=1;i<=f;i++){
            fat = fat * i;
        };

        alert("Fatorial: " + fat);


        // 8. Verificar se é primo
        let p = Number(prompt("8. Verificar se é primo - Digite um número:"));
        contp = 0;

        for(let i=1;i<=p;i++){
            if(p % i == 0){
                contp ++;
            };
        }

        if(contp <= 2){
            alert("O número " + p + " é primo");
        }else{
            alert("O número " + p + " NÃO é primo");
        }


        // 9. Converter temperatura
        let temp = Number(prompt("9. Converter temperatura - Digite temperatura:"));
        let tipo = prompt("Digite C para Celsius ou F para Fahrenheit");

        if(tipo === "C"){
            alert("Fahrenheit: " + ((temp*9/5)+32));
        }else{
            alert("Celsius: " + ((temp-32)*5/9));
        }


        // 10. Somar valores de um array
        let arr = [10,20,30,40];
        let soma = 0;

        for(let v of arr){
            soma += v;
        }

        alert("Soma do array: " + soma);
    </script>
</body>
</html>
